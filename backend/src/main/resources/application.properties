spring.application.name=jira-clone

# ---- Database: MySQL ----
# Update username/password to match what you created (see README / setup instructions).
# If you used the dedicated user from the setup guide: jirauser / your_password_here
#spring.datasource.url=jdbc:mysql://localhost:3306/jiraclone_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 console is no longer used (was only for the in-memory dev DB) — disable explicitly
spring.h2.console.enabled=false

# JPA / Hibernate
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# update: creates/updates tables to match entities but never drops data between restarts.
# Use 'create' once if you want a guaranteed-fresh schema, then switch back to 'update'.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# Logging
logging.level.com.jiraclone=DEBUG

